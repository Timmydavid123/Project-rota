<!-- templates/components/header.html -->
<header class="sticky top-0 z-40 bg-white border-b border-gray-200">
    <div class="px-4 sm:px-6 lg:px-8 py-4 lg:py-5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <!-- Page Title Section -->
            <div class="flex items-center gap-3">
                <div class="lg:hidden w-8"></div>
                <div>
                    <h1 class="text-xl sm:text-2xl lg:text-3xl font-semibold text-gray-900 tracking-tight">{{ title }}</h1>
                    <div class="flex items-center gap-2 mt-1 text-xs sm:text-sm text-gray-500">
                        <span>Home</span>
                        <i class="fas fa-chevron-right text-[10px] text-gray-400"></i>
                        <span class="text-indigo-600 font-medium">{{ title }}</span>
                    </div>
                </div>
            </div>
            
            <!-- Actions -->
            <div class="flex items-center gap-2 sm:gap-3">
                <!-- Search -->
                <button class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-500 hover:text-gray-700 transition-colors">
                    <i class="fas fa-search text-sm sm:text-base"></i>
                </button>
                
                <!-- Notifications -->
                <div class="relative">
                    <button class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-500 hover:text-gray-700 transition-colors">
                        <i class="far fa-bell text-sm sm:text-base"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[10px] font-semibold rounded-full flex items-center justify-center border-2 border-white">3</span>
                    </button>
                </div>
                
                <!-- Date -->
                <div class="hidden md:flex items-center gap-2 px-3 py-2 bg-gray-50 rounded-lg text-gray-600">
                    <i class="far fa-calendar-alt text-gray-400 text-sm"></i>
                    <span class="text-sm font-medium" id="currentDate"></span>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'short',
    day: 'numeric',
    month: 'short',
    year: 'numeric'
});
</script>
